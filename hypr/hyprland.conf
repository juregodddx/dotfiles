# =============================================================================
#  HYPRLAND CONFIG — Juregod
#  Última edição: Abr 2026
# =============================================================================
#  Documentação: https://wiki.hypr.land/Configuring/
# =============================================================================


# =============================================================================
# MONITOR
# =============================================================================

workspace = 1,  monitor:eDP-1,  default:true
workspace = 2,  monitor:eDP-1
workspace = 3,  monitor:eDP-1
workspace = 4,  monitor:eDP-1
workspace = 5,  monitor:eDP-1
workspace = 6,  monitor:eDP-1
workspace = 7,  monitor:eDP-1
workspace = 8,  monitor:eDP-1
workspace = 9,  monitor:eDP-1
workspace = 10, monitor:HDMI-A-1, default:true


# =============================================================================
# PROGRAMAS PADRÃO
# =============================================================================

$terminal    = kitty
$fileManager = thunar
$menu        = hyprlauncher
$mainMod     = SUPER
$qs_call     = qs -c noctalia-shell ipc call


# =============================================================================
# AUTOSTART
# =============================================================================

exec-once = numlockx on
exec-once = qs -c noctalia-shell
exec-once = sh -c 'cd ~/.config/skwd-wall && quickshell -p daemon.qml'
exec-once = discord --start-minimized
exec-once = [workspace special:magic silent] kitty
exec-once = steam -silent


# =============================================================================
# VARIÁVEIS DE AMBIENTE
# =============================================================================

env = WLR_DRM_DEVICES,/dev/dri/by-path/pci-0000:00:02.0-card:/dev/dri/by-path/pci-0000:01:00.0-card
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia


# =============================================================================
# APARÊNCIA GERAL
# =============================================================================

general {
    gaps_in           = 5
    gaps_out          = 20
    border_size       = 2
    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border  = false
    allow_tearing     = false
    layout            = dwindle
}


# =============================================================================
# DECORAÇÃO (sombra, blur, opacidade, dim)
# =============================================================================

decoration {
    rounding       = 10
    rounding_power = 2
    active_opacity   = 1.0
    inactive_opacity = 1.0

    # Escurece janelas inativas levemente
    dim_inactive = true
    dim_strength = 0.2

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled   = true
        size      = 3
        passes    = 1
        vibrancy  = 0.1696
    }
}


# =============================================================================
# ANIMAÇÕES
# =============================================================================

animations {
    enabled = yes, please :)

    # Curvas
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Animações
    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}


# =============================================================================
# LAYOUT
# =============================================================================

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 0
    smart_split = false
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = false
    vfr = false
    vrr = 0
}


# =============================================================================
# SMART GAPS — sem bordas quando há só 1 janela na workspace
# =============================================================================

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1],   gapsout:0, gapsin:0

windowrule {
    name            = no-gaps-wtv1
    match:float     = false
    match:workspace = w[tv1]
    border_size     = 0
    rounding        = 0
}

windowrule {
    name            = no-gaps-f1
    match:float     = false
    match:workspace = f[1]
    border_size     = 0
    rounding        = 0
}


# =============================================================================
# INPUT (teclado, mouse, touchpad)
# =============================================================================

input {
    kb_layout  = br
    kb_variant = abnt2
    kb_model   =
    kb_options =
    kb_rules   =

    numlock_by_default = true
    follow_mouse       = 1
    sensitivity        = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


# =============================================================================
# KEYBINDINGS
# =============================================================================

# --- Aplicativos e Sistema ---
bind = $mainMod,       T, exec, $terminal
bind = $mainMod,       E, exec, $fileManager
bind = $mainMod,       R, exec, $menu
bind = $mainMod,       W, exec, firefox
bind = $mainMod,       Q, killactive,
bind = $mainMod,       V, togglefloating,
bind = $mainMod,       J, layoutmsg, togglesplit
bind = $mainMod,       F, fullscreen, 0
bind = $mainMod,       M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod SHIFT, S, exec, ~/scripts/screenshot.sh
bind = $mainMod SHIFT,   W, exec, sh -c 'cd ~/.config/skwd-wall && quickshell ipc -p daemon.qml call wallpaper toggle'
bindrn = $mainMod, SUPER_L, exec, $qs_call launcher toggle

# --- Foco entre janelas (cruza monitores automaticamente na borda) ---
bind = $mainMod, right, movefocus, r
bind = $mainMod, left,  movefocus, l
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Mover janelas no tiling ---
bind = $mainMod SHIFT, right, exec, ~/scripts/move_or_workspace.sh r
bind = $mainMod SHIFT, left,  exec, ~/scripts/move_or_workspace.sh l
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Foco entre monitores ---
bind = $mainMod, comma,  focusmonitor, l
bind = $mainMod, period, focusmonitor, r

# --- Mover janela para outro monitor ---
bind = $mainMod SHIFT, comma,  movewindow, mon:-1
bind = $mainMod SHIFT, period, movewindow, mon:+1

# --- Centralizar janela ---
bind = CTRL $mainMod, Backslash, centerwindow, 1

# --- Redimensionar janelas (SUPER + ALT + Setas) ---
binde = $mainMod ALT, left,  resizeactive, -10% 0
binde = $mainMod ALT, right, resizeactive,  10% 0
binde = $mainMod ALT, up,    resizeactive,  0 -10%
binde = $mainMod ALT, down,  resizeactive,  0  10%

# --- Redimensionar/mover com mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Pin (fixa janela flutuante em todas as workspaces) ---
bind = $mainMod, P, pin,

# --- Pseudo tiling ---
bind = $mainMod ALT, P, pseudo,

# --- Grupos de janelas (abas) ---
bind = $mainMod,       G,   togglegroup,
bind = $mainMod,       TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# --- Special Workspace / Scratchpad ---
bind = $mainMod,     S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic

# --- Workspaces (SUPER + número) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Mover janela para workspace (SUPER + ALT + número) ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Navegar entre workspaces ---
bind = $mainMod CONTROL, right,      workspace, e+1
bind = $mainMod CONTROL, left,       workspace, e-1
bind = $mainMod CONTROL, mouse_down, workspace, -1
bind = $mainMod CONTROL, mouse_up,   workspace, +1

# --- Multimídia ---
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioPrev,  exec, playerctl previous


# =============================================================================
# REGRAS DE JANELA
# =============================================================================

windowrule {
    name           = suppress-maximize-events
    match:class    = .*
    suppress_event = maximize
}

windowrule {
    name             = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus         = true
}

windowrule {
    name        = move-hyprland-run
    match:class = hyprland-run
    move        = 20 monitor_h-120
    float       = yes
}

windowrule {
    name        = hide-hydra-tray
    match:class = hydralauncher
    match:float = true
    opacity     = 0.0 0.0
    no_focus    = true
    move        = -999 -999
}


# =============================================================================
# IMPORTS
# =============================================================================

source = /home/juregod/.config/hypr/noctalia/noctalia-colors.conf
